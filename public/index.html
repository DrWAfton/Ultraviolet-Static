<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Classroom</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #0f172a; }
        #desktop { height: 100vh; width: 100vw; position: relative; background: linear-gradient(45deg, #0f172a, #1e293b); }
        .icon { width: 100px; text-align: center; color: white; cursor: pointer; padding: 20px; font-weight: bold; }
        #window { width: 95%; height: 85%; background: white; position: absolute; top: 2%; left: 2.5%; border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #title-bar { background: #333; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #search-input { flex-grow: 1; margin: 0 10px; padding: 8px; border-radius: 5px; border: none; }
        iframe { border: none; flex-grow: 1; width: 100%; height: 100%; }
        .btn { cursor: pointer; border: none; padding: 5px 15px; border-radius: 5px; background: #ef4444; color: white; font-weight: bold; }
        .stealth-btn { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; position: absolute; bottom: 20px; right: 20px; }
    </style>
</head>
<body>
    <div id="desktop">
        <div class="icon" onclick="document.getElementById('window').style.display='flex'">
            <img src="https://cdn-icons-png.flaticon.com" width="60"><br>Andy Hub
        </div>
        <div id="window">
            <div id="title-bar">
                <input type="text" id="search-input" placeholder="Enter URL (e.g. snokido.com) and hit Enter...">
                <button class="btn" onclick="document.getElementById('window').style.display='none'">X</button>
            </div>
            <!-- THIS USES A PRE-MADE UNBLOCKER ENGINE -->
            <iframe id="game-frame" src="https://www.google.com"></iframe>
        </div>
        <button class="stealth-btn" onclick="launchStealth()">🚀 LAUNCH STEALTH MODE</button>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const frame = document.getElementById('game-frame');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let url = input.value.trim();
                if (!url.includes('.')) url = 'https://www.google.com' + url;
                else if (!url.startsWith('http')) url = 'https://' + url;
                
                // THE SECRET SAUCE: Using a secondary proxy tunnel
                frame.src = "https://api.allorigins.win" + encodeURIComponent(url);
            }
        });

        function launchStealth() {
            let win = window.open('about:blank', '_blank');
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            let ifr = win.document.createElement('iframe');
            ifr.style.border = 'none'; ifr.style.width = '100%'; ifr.style.height = '100%';
            ifr.src = window.location.href;
            win.document.body.appendChild(ifr);
            win.document.title = "Google Classroom";
        }
    </script>
</body>
</html>
