<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IXL | Recommendations</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        window.__uv$config = {
            prefix: '/uv/service/',
            bare: 'https://uv.holyubofficial.net', 
            encodeUrl: (url) => btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, ''),
            decodeUrl: (url) => atob(url.replace(/_/g, '/').replace(/-/g, '+'))
        };
    </script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* THE IXL CLOAK - LOADS INSTANTLY */
        #ixl-cloak {
            height: 100vh; width: 100vw; 
            background: #78d6ad; /* IXL Green Background */
            display: flex; flex-direction: column; position: absolute; top: 0; left: 0; z-index: 5000;
        }
        #ixl-header { background: #006144; height: 60px; width: 100%; display: flex; align-items: center; padding-left: 20px; color: white; font-weight: bold; cursor: pointer; }

        /* THE SECRET ANDY HUB - HIDDEN BY DEFAULT */
        #desktop { height: 100vh; width: 100vw; position: relative; background: #0f172a; display: none; z-index: 10; }
        #window { width: 95%; height: 85%; background: white; position: absolute; top: 2%; left: 2.5%; border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100; }
        #title-bar { background: #333; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #search-input { flex-grow: 1; padding: 8px; border-radius: 5px; border: none; outline: none; color: black; }
        iframe { border: none; flex-grow: 1; width: 100%; height: 100%; }
        #taskbar { position: absolute; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .panic-btn { background: #ff5f56; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<!-- 1. THE IXL CLOAK (FIRST THING YOU SEE) -->
<div id="ixl-cloak">
    <div id="ixl-header" onclick="checkUnlock()">
        <img src="https://www.ixl.com" width="25" style="margin-right:10px;"> IXL Learning | Recommendations
    </div>
    <div style="padding: 40px; color: #006144;">
        <h1 style="font-size: 32px;">Good afternoon, Andon!</h1>
        <p style="font-size: 18px;">What should I work on today?</p>
        <div style="background:white; padding:20px; border-radius:10px; margin-top:20px; width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <b style="color: #0073bb;">⭐ Determine the meanings of Greek and Latin roots (VKQ)</b>
        </div>
    </div>
</div>

<!-- 2. THE SECRET ANDY HUB (HIDDEN) -->
<div id="desktop">
    <div style="color:white; padding:20px; cursor:pointer;" onclick="document.getElementById('window').style.display='flex'">
        <img src="https://cdn-icons-png.flaticon.com" width="60"><br>Andy Hub
    </div>

    <div id="window">
        <div id="title-bar">
            <input type="text" id="search-input" placeholder="Search Google or enter URL..." onkeydown="if(event.key==='Enter') search()">
            <button class="panic-btn" onclick="lockScreen()">PANIC (IXL)</button>
            <button class="panic-btn" style="background:#444" onclick="document.getElementById('window').style.display='none'">X</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <div id="taskbar">
        <button onclick="lockScreen()" style="background:#006144; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">🔒 Back to IXL</button>
    </div>
</div>

<script>
    const cloak = document.getElementById('ixl-cloak');
    const desktop = document.getElementById('desktop');

    // THE SECRET UNLOCK: Click the "IXL Learning" text 3 times to reveal Andy Hub
    let clickCount = 0;
    function checkUnlock() {
        clickCount++;
        if (clickCount >= 3) {
            cloak.style.display = 'none';
            desktop.style.display = 'block';
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 2000); // Reset if too slow
    }

    function lockScreen() {
        cloak.style.display = 'flex';
        desktop.style.display = 'none';
    }

    async function search() {
        const input = document.getElementById('search-input').value.trim();
        const frame = document.getElementById('game-frame');
        if (!input) return;

        let url = input.includes('.') ? (input.startsWith('http') ? input : 'https://' + input) : 'https://www.google.com' + input;
        
        if ('serviceWorker' in navigator) {
            await navigator.serviceWorker.register('/sw.js');
            const encoded = btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
            frame.src = "/uv/service/" + encoded;
            document.getElementById('window').style.display = 'flex';
        }
    }
</script>

</body>
</html>
