<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IXL | Recommendations</title>
    <link rel="icon" href="https://i.imgur.com" type="image/png">
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        window.__uv$config = {
            prefix: '/uv/service/',
            bare: 'https://uv.holyubofficial.net', 
            encodeUrl: (url) => btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, ''),
            decodeUrl: (url) => atob(url.replace(/_/g, '/').replace(/-/g, '+'))
        };

               async function search() {
            const input = document.getElementById('search-input').value.trim();
            const frame = document.getElementById('game-frame');
            if (!input) return;

            let url = input.includes('.') ? (input.startsWith('http') ? input : 'https://' + input) : 'https://www.google.com' + encodeURIComponent(input);
            
            if ('serviceWorker' in navigator) {
                try {
                    // This registers the proxy brain and forces it to wake up NOW
                    await navigator.serviceWorker.register('/sw.js', { scope: '/uv/service/' });
                    
                    // Scramble the URL
                    const encoded = btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
                    
                    // Show the window and load the game
                    document.getElementById('window').style.display = 'flex';
                    frame.src = "/uv/service/" + encoded;
                } catch (err) {
                    console.error("Proxy Brain Error:", err);
                    // Fallback if the proxy is being a pain
                    document.getElementById('window').style.display = 'flex';
                    frame.src = url; 
                }
            }
        }


        function unlock() { document.getElementById('ixl-cloak').style.display = 'none'; document.getElementById('desktop').style.display = 'block'; }
        function lockScreen() { document.getElementById('ixl-cloak').style.display = 'block'; document.getElementById('desktop').style.display = 'none'; }
        
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'l') {
                if (document.activeElement.id === 'search-input') return;
                lockScreen();
            }
        });
    </script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #78d6ad; }
        /* 1:1 MATCH IMAGE */
        #ixl-cloak { height: 100vh; width: 100vw; background: #78d6ad url('https://i.imgur.com/GuocbDn.jpeg') no-repeat center center; background-size: cover; position: absolute; top: 0; left: 0; z-index: 1000; }
        #unlock-trigger { position: absolute; top: 0; left: 0; width: 220px; height: 90px; cursor: default; z-index: 3000; }
        #real-ixl-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: default; z-index: 2000; }
        #desktop { height: 100vh; width: 100vw; position: relative; background: #0f172a; display: none; z-index: 5000; }
        #window { width: 95%; height: 85%; background: white; position: absolute; top: 2%; left: 2.5%; border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 6000; }
        #title-bar { background: #333; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #search-input { flex-grow: 1; padding: 8px; border-radius: 5px; border: none; outline: none; color: black; }
        iframe { border: none; flex-grow: 1; width: 100%; height: 100%; }
        .panic-btn { background: #ff5f56; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div id="ixl-cloak">
    <div id="unlock-trigger" ondblclick="unlock()"></div>
    <div id="real-ixl-trigger" onclick="window.open('https://www.ixl.com', '_blank')"></div>
</div>
<div id="desktop">
    <div style="color:white; padding:20px; cursor:pointer;" onclick="document.getElementById('window').style.display='flex'">
        <img src="https://cdn-icons-png.flaticon.com" width="60"><br>Andy Hub
    </div>
    <div id="window">
        <div id="title-bar">
            <input type="text" id="search-input" placeholder="Search IXL..." onkeydown="if(event.key==='Enter') search()">
            <button class="panic-btn" onclick="lockScreen()">PANIC (IXL)</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>
</div>
</body>
</html>
