        #unlock-trigger { position: absolute; top: 0; left: 0; width: 220px; height: 90px; cursor: default; z-index: 6000; }
        #real-ixl-trigger { position: absolute; top: 90px; left: 0; width: 100%; height: 90%; cursor: default; z-index: 5500; }
        #desktop { height: 100vh; width: 100vw; position: relative; background: #0f172a; display: none; z-index: 10; }
        #window { width: 95%; height: 85%; background: white; position: absolute; top: 2%; left: 2.5%; border-radius: 12px; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100; }
        #title-bar { background: #333; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #search-input { flex-grow: 1; padding: 8px; border-radius: 5px; border: none; outline: none; color: black; }
        iframe { border: none; flex-grow: 1; width: 100%; height: 100%; }
        #taskbar { position: absolute; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .panic-btn { background: #ff5f56; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div id="ixl-cloak">
    <div id="unlock-trigger" ondblclick="unlock()"></div>
    <div id="real-ixl-trigger" onclick="window.open('https://www.ixl.com', '_blank')"></div>
</div>
<div id="desktop">
    <div style="color:white; padding:20px; cursor:pointer;" onclick="document.getElementById('window').style.display='flex'">
        <img src="https://cdn-icons-png.flaticon.com" width="60"><br>Andy Hub
    </div>
    <div id="window">
        <div id="title-bar">
            <!-- This onkeydown line makes the Search Bar wake up! -->
            <input type="text" id="search-input" placeholder="Search Google or enter URL..." onkeydown="if(event.key==='Enter') search()">
            <button class="panic-btn" onclick="lockScreen()">PANIC (IXL)</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>
</div>
<script>
    function unlock() {
        document.getElementById('ixl-cloak').style.display = 'none';
        document.getElementById('desktop').style.display = 'block';
    }
    function lockScreen() {
        document.getElementById('ixl-cloak').style.display = 'block';
        document.getElementById('desktop').style.display = 'none';
    }
    async function search() {
        const input = document.getElementById('search-input').value.trim();
        const frame = document.getElementById('game-frame');
        if (!input) return;
        let url = input.includes('.') ? (input.startsWith('http') ? input : 'https://' + input) : 'https://www.google.com' + encodeURIComponent(input);
        
        if ('serviceWorker' in navigator) {
            try {
                await navigator.serviceWorker.register('/sw.js');
                const encoded = btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
                frame.src = "/uv/service/" + encoded;
                document.getElementById('window').style.display = 'flex';
            } catch (e) {
                frame.src = url;
                document.getElementById('window').style.display = 'flex';
            }
        }
    }
</script>
</body>
</html>
