<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>andy-made-it-allbyhimself</title>
    
<script src="/lib/uv.bundle.js"></script>
<script src="/lib/uv.config.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #desktop {
            background: url('https://images.unsplash.com') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; width: 100vw; position: relative;
        }

        .icon {
            width: 100px; text-align: center; color: white; cursor: pointer;
            padding: 15px; margin: 10px; border-radius: 12px; transition: 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .icon:hover { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .icon img { width: 60px; display: block; margin: 0 auto 8px; }

        #window {
            width: 900px; height: 600px; background: #1a1a1a;
            position: absolute; top: 5%; left: 8%;
            border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: none; flex-direction: column; overflow: hidden;
            z-index: 10; border: 2px solid #444;
        }

        #title-bar {
            background: #333; color: white; padding: 10px; display: flex;
            justify-content: space-between; align-items: center; gap: 10px;
        }

        /* THE NEW SEARCH BAR */
        #search-input {
            flex-grow: 1; padding: 6px 12px; border-radius: 20px;
            border: none; background: #444; color: white; outline: none;
        }
        #search-input::placeholder { color: #888; }

        .window-controls { display: flex; gap: 8px; }
        .btn { padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; border: none; color: white; font-weight: bold; }
        .home-btn { background: #4a90e2; }
        .close-btn { background: #ff5f56; }

        #game-menu {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: center; height: 100%; gap: 20px; padding: 20px;
            background: #121212; overflow-y: auto;
        }

        .mod-card {
            width: 180px; background: #252525; padding: 15px; border-radius: 10px;
            text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .mod-card:hover { border-color: #ffde00; transform: scale(1.05); }
        .mod-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .mod-card span { color: white; font-weight: bold; display: block; }

        iframe { border: none; flex-grow: 1; width: 100%; height: 100%; display: none; background: white; }

        #taskbar {
            position: absolute; bottom: 0; width: 100%; height: 55px;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 15px; z-index: 100;
        }
        .start-btn { background: #ffde00; color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="openWindow()">
        <img src="https://cdn-icons-png.flaticon.com" alt="fnf">
        <span>Andy's Hub</span>
    </div>

    <div id="window">
        <div id="title-bar">
            <!-- SEARCH BAR IN THE TITLE -->
            <input type="text" id="search-input" placeholder="Enter URL or search Google..." onkeydown="if(event.key==='Enter') search()">
            <div class="window-controls">
                <button class="btn home-btn" onclick="showMenu()">Home</button>
                <button class="btn close-btn" onclick="closeWindow()">X</button>
            </div>
        </div>

        <div id="game-menu">
            <div class="mod-card" onclick="loadGame('https://ninjamuffin99.github.io')">
                <img src="https://wallpapers.com" alt="original">
                <span>Original FNF</span>
            </div>
            <div class="mod-card" onclick="loadGame('https://snokido.games')">
                <img src="https://art.pixilart.com" alt="whitty">
                <span>Whitty Mod</span>
            </div>
        </div>

        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="taskbar">
        <button class="start-btn">Yo, it's Andy</button>
    </div>
</div>

<script>
    const win = document.getElementById('window');
    const menu = document.getElementById('game-menu');
    const frame = document.getElementById('game-frame');
    const searchInput = document.getElementById('search-input');

    function openWindow() { win.style.display = 'flex'; showMenu(); }
    function closeWindow() { win.style.display = 'none'; frame.src = ""; }
    
    function loadGame(url) {
        menu.style.display = 'none';
        frame.style.display = 'block';
        frame.src = url; 
    }

    function showMenu() {
        menu.style.display = 'flex';
        frame.style.display = 'none';
        frame.src = "";
    }

    // THE PROXY SEARCH FUNCTION
    function search() {
        let url = searchInput.value.trim();
        if (!url) return;
        
        // If it's not a URL, search Google
        if (!url.includes('.') || url.includes(' ')) {
            url = 'https://www.google.com' + encodeURIComponent(url);
        } else if (!url.startsWith('http')) {
            url = 'https://' + url;
        }

        menu.style.display = 'none';
        frame.style.display = 'block';
        
        // This uses Ultraviolet's encoding to bypass filters!
        frame.src = "/uv/service/" + btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
    }
</script>

</body>
</html>
